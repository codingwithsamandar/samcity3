# ═══════════════════════════════════════════════════════════════════
#  SamCity — nginx reverse proxy
#  - /static/ va /media/ ni to'g'ridan beradi
#  - /ws/ uchun WebSocket upgrade header'lari (chat/taxi/delivery)
#  - qolganini daphne (web:8000) ga proxy qiladi
#
#  Lokal/HTTP: shu holicha ishlaydi (docker compose up).
#  Production/HTTPS: pastdagi "PRODUCTION HTTPS" blokini yoqing,
#  ./certs/ ichiga fullchain.pem va privkey.pem qo'ying.
# ═══════════════════════════════════════════════════════════════════

upstream samcity_web {
    server web:8000;
}

# WebSocket upgrade uchun yordamchi
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Gzip siqish (ko'p foydalanuvchida tarmoqni tejaydi) ──
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 5;
gzip_types text/plain text/css application/json application/javascript
           text/javascript application/xml application/xml+rss image/svg+xml;

server {
    listen 80;
    server_name _;
    client_max_body_size 25M;

    # Let's Encrypt ACME tekshiruvi (sertifikat olish uchun)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Statik fayllar (to'g'ridan, web'ga tegmasdan) ──
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # ── WebSocket (Channels: ws/chat/, ws/taxi/, ws/delivery/, ws/notifications/) ──
    location /ws/ {
        proxy_pass http://samcity_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # uzoq ulanishlar uchun
        proxy_send_timeout 3600s;
    }

    # ── Qolgan barcha so'rovlar → daphne ──
    location / {
        proxy_pass http://samcity_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ╔═══ PRODUCTION HTTPS uchun: yuqoridagi `location /` larni o'chirib,
    #     bu satrni yoqing — barcha HTTP'ni HTTPS'ga yo'naltiradi:
    # return 301 https://$host$request_uri;
    # ╚═══
}

