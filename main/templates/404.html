<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahifa topilmadi — SamCity</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0f1729;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem;
    background:radial-gradient(60% 50% at 50% 0%,rgba(79,70,229,.07),transparent 60%),#fff;}
  .code{font-family:'Plus Jakarta Sans';font-size:clamp(4rem,14vw,8rem);font-weight:800;letter-spacing:-.04em;
    background:linear-gradient(120deg,#4f46e5,#7c3aed);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  h1{font-family:'Plus Jakarta Sans';font-size:1.5rem;margin-top:.5rem}
  p{color:#5b6678;margin:.7rem 0 1.6rem;max-width:380px}
  a{display:inline-block;background:linear-gradient(135deg,#4f46e5,#4338ca);color:#fff;text-decoration:none;
    padding:.8rem 1.6rem;border-radius:14px;font-weight:650;box-shadow:0 10px 28px rgba(79,70,229,.28)}
  /* Dark mode (OS sozlamasiga mos) — oq ekran o'rniga qora */
  @media (prefers-color-scheme: dark){
    body{background:radial-gradient(60% 50% at 50% 0%,rgba(79,70,229,.16),transparent 60%),#0e1525;color:#e6eaf2;}
    p{color:#9aa6bd;}
  }
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Sahifa topilmadi</h1>
    <p>Kechirasiz, siz qidirgan sahifa mavjud emas yoki ko'chirilgan.</p>
    <a href="/">Bosh sahifaga qaytish</a>
  </div>
</body>
</html>
