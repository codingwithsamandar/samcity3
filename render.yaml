# ═══════════════════════════════════════════════════════════════════
#  SamCity — Render.com Blueprint (Infrastructure as Code)
#  Render'da: New → Blueprint → repo'ni ulang → shu fayl avtomatik o'qiladi.
#
#  Xizmatlar:
#    web    — Django ASGI (Daphne) + WebSocket (chat/tracking). Docker image
#             entrypoint.sh: migrate → collectstatic → daphne.
#    worker — Telegram OTP boti (doimiy polling). DIQQAT: Render Background
#             Worker PULLIK plan talab qiladi (free tarifda ishlamaydi).
#             Kerak bo'lmasa shu blokni o'chirib qo'ying — OTP baribbr SMS'ga
#             qaytadi (RENDER_DEPLOY.md ga qarang).
#    samcity-db    — PostgreSQL (bepul)
#    samcity-redis — Redis/Key-Value (Channels layer + cache; ixtiyoriy)
#
#  Qo'lda kiritiladigan (maxfiy) o'zgaruvchilar `sync: false` bilan belgilangan —
#  ularni Render panelida (Environment) kiritasiz. Batafsil: RENDER_DEPLOY.md
# ═══════════════════════════════════════════════════════════════════
services:
  # ── WEB (Daphne ASGI) ─────────────────────────────────────────────
  - type: web
    name: samcity
    runtime: docker
    plan: free
    region: frankfurt          # Markaziy Osiyoga eng yaqin bepul region
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/
    autoDeploy: true           # git push → avtomatik qayta deploy
    envVars:
      # ── Django asosiy ──
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true    # Render xavfsiz kalitni o'zi yaratadi
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"          # Render TLS beradi; settings'da proxy header sozlangan
      # ── CORS (mobil/web klient) ──
      - key: CORS_ALLOWED_ORIGINS
        value: "https://*.onrender.com"
      # ── JWT (Flutter mobil ilova) ──
      - key: JWT_ACCESS_MINUTES
        value: "60"
      - key: JWT_REFRESH_DAYS
        value: "30"
      # ── PostgreSQL (quyidagi bepul bazadan avtomatik) ──
      - key: POSTGRES_DB
        fromDatabase: { name: samcity-db, property: database }
      - key: POSTGRES_USER
        fromDatabase: { name: samcity-db, property: user }
      - key: POSTGRES_PASSWORD
        fromDatabase: { name: samcity-db, property: password }
      - key: POSTGRES_HOST
        fromDatabase: { name: samcity-db, property: host }
      - key: POSTGRES_PORT
        fromDatabase: { name: samcity-db, property: port }
      # ── Redis (Channels real-time layer + cache) — PULLI/ixtiyoriy ──
      # BEPUL tarif: o'chirib qo'yilgan (in-memory layer ishlaydi). Redis
      # xizmatini yoqsangiz, quyidagi 2 qatorni oching:
      # - key: REDIS_URL
      #   fromService: { name: samcity-redis, type: redis, property: connectionString }
      # ── Telegram OTP (bot orqali tasdiqlash kodi) ──
      # Token @BotFather'dan olinadi va Render panelida kiritiladi (maxfiy).
      - key: TELEGRAM_OTP_ENABLED
        value: "True"          # DEBUG'dan mustaqil — env orqali yoqiladi
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false            # ixtiyoriy (deep-link t.me/<username> uchun)
      # ── SMS (login/OTP zaxira kanali) — Render panelidan (maxfiy) ──
      - key: SMS_BACKEND
        value: "eskiz"
      - key: SMS_ESKIZ_EMAIL
        sync: false
      - key: SMS_ESKIZ_PASSWORD
        sync: false
      - key: SMS_ESKIZ_FROM
        value: "4546"
      # ── To'lov shlyuzlari ──
      - key: PAYME_MERCHANT_ID
        sync: false
      - key: PAYME_MERCHANT_KEY
        sync: false
      - key: CLICK_SERVICE_ID
        sync: false
      - key: CLICK_SECRET_KEY
        sync: false
      # ── Media Storage (Supabase S3) ──
      - key: AWS_STORAGE_BUCKET_NAME
        value: "media"
      - key: AWS_S3_REGION_NAME
        value: "ap-northeast-1"
      - key: AWS_S3_ENDPOINT_URL
        value: "https://shyllblzdbjctcbwgzun.storage.supabase.co/storage/v1/s3"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # ── Monitoring (ixtiyoriy) ──
      - key: SENTRY_DSN
        sync: false

  # ════════════════════════════════════════════════════════════════
  # ⚠️ BEPUL TARIF: worker va redis O'CHIRILGAN (izohga olingan).
  # Render Background Worker PULLI plan talab qiladi. Web + Postgres bepul.
  # Telegram OTP baribbr ishlaydi: kod WEB xizmatidan yuboriladi (web'da
  # TELEGRAM_BOT_TOKEN bor). Bot polling'ni pulli planga o'tsangiz yoki
  # LOKAL kompyuterda ishga tushirasiz (pastdagi izohga qarang).
  # Pulli planga o'tsangiz — quyidagi ikki blokdan '# ' larni oching.
  # ════════════════════════════════════════════════════════════════
  #
  # - type: worker
  #   name: samcity-telegram-bot
  #   runtime: docker
  #   plan: starter
  #   region: frankfurt
  #   dockerfilePath: ./Dockerfile
  #   dockerCommand: python manage.py run_telegram_bot
  #   autoDeploy: true
  #   envVars:
  #     - key: DJANGO_DEBUG
  #       value: "False"
  #     - key: DJANGO_SECRET_KEY
  #       generateValue: true
  #     - key: POSTGRES_DB
  #       fromDatabase: { name: samcity-db, property: database }
  #     - key: POSTGRES_USER
  #       fromDatabase: { name: samcity-db, property: user }
  #     - key: POSTGRES_PASSWORD
  #       fromDatabase: { name: samcity-db, property: password }
  #     - key: POSTGRES_HOST
  #       fromDatabase: { name: samcity-db, property: host }
  #     - key: POSTGRES_PORT
  #       fromDatabase: { name: samcity-db, property: port }
  #     - key: TELEGRAM_OTP_ENABLED
  #       value: "True"
  #     - key: TELEGRAM_BOT_TOKEN
  #       sync: false
  #     - key: TELEGRAM_BOT_USERNAME
  #       sync: false
  #
  # - type: redis
  #   name: samcity-redis
  #   plan: free
  #   region: frankfurt
  #   maxmemoryPolicy: allkeys-lru
  #   ipAllowList: []

databases:
  - name: samcity-db
    plan: free                 # 1GB (bepul; muddati cheklangan)
    region: frankfurt
    databaseName: samcity
    user: samcity
