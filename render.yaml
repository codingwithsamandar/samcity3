# ═══════════════════════════════════════════════════════════════════
#  SamCity — Render.com Blueprint (Infrastructure as Code)
#  Render'da: New → Blueprint → repo'ni ulang → shu fayl avtomatik o'qiladi.
#  Web service (Docker/daphne ASGI) + bepul PostgreSQL.
# ═══════════════════════════════════════════════════════════════════
services:
  - type: web
    name: samcity
    runtime: docker
    plan: free
    region: frankfurt          # Markaziy Osiyoga eng yaqin bepul region
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/
    autoDeploy: true           # git push → avtomatik qayta deploy
    envVars:
      # ── Django asosiy ──
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true    # Render xavfsiz kalitni o'zi yaratadi
      # '.onrender.com' — barcha onrender subdomenlariga mos (app nomini bilish shart emas)
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"          # Render TLS beradi; settings'da proxy header sozlangan
      # ── CORS (mobil/web klient) ──
      - key: CORS_ALLOWED_ORIGINS
        value: "https://*.onrender.com"
      # ── JWT (Flutter mobil ilova) ──
      - key: JWT_ACCESS_MINUTES
        value: "60"
      - key: JWT_REFRESH_DAYS
        value: "30"
      # ── PostgreSQL (quyidagi bepul bazadan avtomatik olinadi) ──
      - key: POSTGRES_DB
        fromDatabase:
          name: samcity-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: samcity-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: samcity-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: samcity-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: samcity-db
          property: port
      # ── SMS (login/OTP) — Render panelidan to'ldiring (maxfiy) ──
      # sync:false → blueprint ularni bekor qilmaydi, qiymatni qo'lda kiritasiz
      - key: SMS_BACKEND
        value: "eskiz"
      - key: SMS_ESKIZ_EMAIL
        sync: false
      - key: SMS_ESKIZ_PASSWORD
        sync: false
      - key: SMS_ESKIZ_FROM
        value: "4546"
      # ── To'lov shlyuzlari (keyin to'ldirsa bo'ladi) ──
      - key: PAYME_MERCHANT_ID
        sync: false
      - key: PAYME_MERCHANT_KEY
        sync: false
      - key: CLICK_SERVICE_ID
        sync: false
      - key: CLICK_SECRET_KEY
        sync: false
      # ── Supabase S3 Media Storage ──
      - key: AWS_STORAGE_BUCKET_NAME
        value: "media"
      - key: AWS_S3_REGION_NAME
        value: "ap-northeast-1"
      - key: AWS_S3_ENDPOINT_URL
        value: "https://shyllblzdbjctcbwgzun.storage.supabase.co/storage/v1/s3"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # ── Monitoring (ixtiyoriy) ──
      - key: SENTRY_DSN
        sync: false

databases:
  - name: samcity-db
    plan: free                 # 1GB, 30 kundan keyin muddati tugaydi
    region: frankfurt
    databaseName: samcity
    user: samcity
