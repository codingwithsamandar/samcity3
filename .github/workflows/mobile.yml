name: Mobile CI

on:
  push:
    branches: [main, master]
    paths: ["mobile/**", ".github/workflows/mobile.yml"]
  pull_request:
    branches: [main, master]
    paths: ["mobile/**", ".github/workflows/mobile.yml"]

defaults:
  run:
    working-directory: mobile

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter o'rnatish
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Paketlar (pub get)
        run: flutter pub get

      - name: Kod formati tekshiruvi
        run: dart format --output=none --set-exit-if-changed .

      - name: Statik tahlil
        run: flutter analyze

      - name: Testlar
        run: flutter test
