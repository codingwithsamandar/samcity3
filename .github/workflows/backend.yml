name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: samcity_ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci -d samcity_ci"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production-0123456789
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "http://localhost"
      POSTGRES_DB: samcity_ci
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      # CI'da SSL redirect'ni o'chiramiz (test klienti http ishlatadi)
      SECURE_SSL_REDIRECT: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bog'liqliklarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff — kritik xatolar)
        run: ruff check . --select=E9,F63,F7,F82 --exclude venv,mobile

      - name: Migratsiya yetishmovchiligini tekshirish
        run: python manage.py makemigrations --check --dry-run

      - name: Deploy tekshiruvi
        run: python manage.py check --deploy

      - name: Testlar
        run: python manage.py test --verbosity 2
